[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "rebuno"
version = "0.1.2"
description = "Python SDK for the Rebuno execution runtime"
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
authors = [
    { name = "Nathan Wong" },
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries",
]
dependencies = [
    "httpx>=0.25.0",
    "pydantic>=2.0.0",
]

[project.urls]
Homepage = "https://github.com/rebuno/rebuno"
Repository = "https://github.com/rebuno/rebuno"
Documentation = "https://github.com/rebuno/rebuno/tree/main/docs"

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-asyncio>=0.21",
]
mcp = [
    "fastmcp>=2.0.0",
]

[tool.hatch.build]
sources = ["src"]
